  <text x="80" y="290" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#f0ece5" letter-spacing="-1">YOU RUN THE</text>
  <text x="80" y="390" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#f0ece5" letter-spacing="-1">JOBSITE. WE KEEP</text>
  <text x="80" y="490" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" fill="#c85a1e" letter-spacing="-1">YOUR PHONE RINGING.</text>

