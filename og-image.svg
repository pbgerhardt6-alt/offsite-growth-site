  <text x="156" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#f0ece5" letter-spacing="3">OFFSITE</text>
  <text x="408" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#c85a1e" letter-spacing="3">.</text>
  <text x="426" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#f0ece5" letter-spacing="3">GROWTH</text>

