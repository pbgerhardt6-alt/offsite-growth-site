  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(240,236,229,0.03)"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="rgba(240,236,229,0.03)"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(240,236,229,0.03)"/>
  <line x1="0" y1="525" x2="1200" y2="525" stroke="rgba(240,236,229,0.03)"/>
  <line x1="200" y1="0" x2="200" y2="630" stroke="rgba(240,236,229,0.03)"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(240,236,229,0.03)"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(240,236,229,0.03)"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(240,236,229,0.03)"/>
